<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山水立軸 - 自由構圖教室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #f1f1e6; }
        
        /* 頁面整體佈局 */
        .page-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100 screen;
            overflow: hidden;
        }

        /* 垂直畫布區域 */
        .canvas-area {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 2rem 0;
            background-image: url('https://www.transparenttextures.com/patterns/lined-paper-2.png');
        }

        /* 垂直立軸畫布 */
        .vertical-canvas {
            width: 450px; /* 打直長方形寬度 */
            height: 800px; /* 打直長方形高度 */
            background-color: #fcfcfc;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid #dcdcdc;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }
        .vertical-canvas:hover { box-shadow: 0 25px 60px rgba(0,0,0,0.2); }

        /* 物件基礎樣式 */
        .element-item { touch-action: none; position: absolute; cursor: grab; line-height: 0; }
        .element-item:active { cursor: grabbing; }
        
        /* 關鍵修正：圖片緊貼藍框 */
        .element-item img { width: 100%; height: auto; pointer-events: none; }
        
        /* 選中狀態的藍色虛線範圍框 (緊貼圖片邊界) */
        .selected-box {
            outline: 2px dashed #3b82f6;
            outline-offset: 1px; /* 稍微靠外面一點，不遮擋圖片邊界 */
        }

        /* 物件上方的浮動控制按鈕 (🔼, 🔽, ✕) */
        .floating-controls {
            position: absolute;
            top: -36px; /* 浮在藍框上方 */
            left: 0;
            display: none;
            gap: 4px;
            z-index: 1000;
        }
        .selected-box .floating-controls { display: flex; }
        
        /* 縮放手柄 */
        .resize-handle {
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            border: 2px solid white;
            display: none;
            z-index: 100;
        }
        .selected-box .resize-handle { display: block; }
    </style>
</head>
<body>
    <div id="app" class="page-container h-screen" @click="selectedId = null">
        <header class="bg-stone-900 text-stone-200 p-4 flex justify-between items-center shadow-2xl z-50 relative">
            <div>
                <h1 class="text-xl font-bold tracking-[0.2em]">山水立軸：自由構圖系統</h1>
                <p class="text-xs text-stone-500">點擊物件顯示藍框，使用上方按鈕調整前後與刪除</p>
            </div>
            <button @click="clearAll" class="text-xs border border-stone-600 px-4 py-2 rounded-full hover:bg-red-900 transition hover:border-red-800 tracking-wider">清空畫布</button>
        </header>

        <div class="canvas-area flex-grow">
            <div class="vertical-canvas rounded" id="canvas">
                <div v-if="elements.length === 0" class="absolute inset-0 flex items-center justify-center text-stone-300 pointer-events-none">
                    <p class="text-lg italic text-stone-400 font-serif">請從下方點擊素材開始創作</p>
                </div>
                
                <div v-for="el in elements" 
                     :key="el.id"
                     :id="'el-' + el.id"
                     class="element-item group"
                     :class="{ 'selected-box': selectedId === el.id }"
                     @click.stop="selectedId = el.id"
                     :style="{ width: el.w + 'px', left: el.x + 'px', top: el.y + 'px', zIndex: el.z }">
                    
                    <img :src="el.img" :alt="el.name">
                    
                    <div class="floating-controls bg-white p-1 rounded-full shadow-lg border border-blue-200">
                        <button @click.stop="moveLayer(el.id, 1)" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-blue-50 text-xs" title="上移 (往後退)">🔼</button>
                        <button @click.stop="moveLayer(el.id, -1)" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-blue-50 text-xs" title="下移 (往前移)">🔽</button>
                        <div class="w-px h-6 bg-stone-200 mx-1"></div>
                        <button @click.stop="deleteElement(el.id)" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-red-50 text-red-600 text-xs" title="刪除">✕</button>
                    </div>

                    <div class="resize-handle cursor-nwse-resize"></div>
                </div>
            </div>
        }

        <aside class="bg-stone-50 p-6 rounded-t-2xl border-t border-stone-300 shadow-2xl z-50 relative">
            <h2 class="font-bold text-stone-700 text-sm border-b border-stone-200 pb-3 text-center mb-4 tracking-widest">素材庫 (點擊新增)</h2>
            <div class="flex flex-row gap-3 overflow-x-auto pb-2 justify-center">
                <button v-for="lib in library" :key="lib.type" 
                        @click="addElement(lib)"
                        class="bg-white p-3 rounded-lg border border-stone-200 hover:border-blue-400 hover:bg-blue-50 transition flex flex-col items-center gap-2 group shadow-sm flex-shrink-0 w-28">
                    <div class="w-20 h-16 flex items-center justify-center overflow-hidden bg-stone-50 rounded">
                        <img :src="lib.img" class="max-w-full max-h-full object-contain group-hover:scale-110 transition">
                    </div>
                    <span class="text-[12px] font-medium text-stone-800 tracking-wider">{{ lib.name }}</span>
                </button>
            </div>
        </aside>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    selectedId: null,
                    nextId: 1,
                    // 素材庫定義
                    library: [
                        { name: '遠山 1', type: 'mountain', img: 'mountain.png', defaultW: 300 },
                        { name: '遠山 2', type: 'mountain2', img: 'mountain2.png', defaultW: 300 },
                        { name: '古樹 1', type: 'tree', img: 'tree.png', defaultW: 80 },
                        { name: '古樹 2', type: 'tree2', img: 'tree2.png', defaultW: 100 },
                        { name: '樓閣', type: 'building', img: 'building1.png', defaultW: 120 },
                        { name: '小橋', type: 'bridge', img: 'bridge.png', defaultW: 150 },
                        { name: '小船', type: 'boat', img: 'boat.png', defaultW: 100 },
                        { name: '景石', type: 'rock', img: 'rock.png', defaultW: 100 },
                    ],
                    elements: [] // 初始畫布為空
                }
            },
            mounted() { this.initInteract(); },
            methods: {
                // 新增物件到畫布
                addElement(lib) {
                    const newEl = {
                        id: this.nextId++,
                        name: lib.name,
                        img: lib.img,
                        // 新增位置稍微偏移，避免完全重疊
                        x: 50 + (this.elements.length % 5 * 20),
                        y: 50 + (this.elements.length % 5 * 20),
                        w: lib.defaultW,
                        z: this.elements.length + 1 // 新物件放在最上層
                    };
                    this.elements.push(newEl);
                    this.selectedId = newEl.id;
                },
                // 刪除指定物件
                deleteElement(id) {
                    this.elements = this.elements.filter(el => el.id !== id);
                    if (this.selectedId === id) this.selectedId = null;
                },
                // 調整圖層 (delta: 1 或 -1)
                moveLayer(id, delta) {
                    const el = this.elements.find(e => e.id === id);
                    if (el) {
                        el.z = Math.max(1, el.z + delta);
                    }
                },
                initInteract() {
                    // 初始化拖拽
                    interact('.element-item').draggable({
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) {
                                el.x += event.dx;
                                el.y += event.dy;
                            }
                        }}
                    }).resizable({
                        edges: { right: true, bottom: true, bottomRight: true },
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) {
                                el.w = event.rect.width;
                                el.x += event.deltaRect.left;
                                el.y += event.deltaRect.top;
                                // 移除高度調整，讓圖片高度自動隨寬度比例縮放
                            }
                        }}
                    });
                },
                clearAll() {
                    if (confirm('確定要清空所有畫作內容，從頭開始嗎？')) {
                        this.elements = [];
                        this.selectedId = null;
                        this.nextId = 1;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
