<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山水畫教室 - 自由構圖系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #e7e5e4; }
        .canvas-bg {
            background-color: #f5f5f4;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }
        .element-item { touch-action: none; position: absolute; cursor: grab; }
        .element-item:active { cursor: grabbing; }
        .element-item img { width: 100%; height: 100%; object-fit: contain; }
        
        .selected-box {
            outline: 2px dashed #3b82f6;
            outline-offset: 4px;
        }

        .resize-handle {
            position: absolute;
            bottom: -8px;
            right: -8px;
            width: 16px;
            height: 16px;
            background: #3b82f6;
            border-radius: 50%;
            border: 2px solid white;
            display: none;
            z-index: 100;
        }
        .selected-box .resize-handle { display: block; }
    </style>
</head>
<body>
    <div id="app" class="h-screen flex flex-col" @click="selectedId = null">
        <header class="bg-stone-900 text-stone-200 p-4 flex justify-between items-center shadow-2xl">
            <div>
                <h1 class="text-xl font-bold tracking-[0.2em]">山水意境：自由構圖教室</h1>
                <p class="text-xs text-stone-500">從左側選擇素材新增到畫布，拖動調整位置與大小</p>
            </div>
            <button @click="clearAll" class="text-xs border border-stone-600 px-4 py-2 rounded-full hover:bg-red-900 transition hover:border-red-800">清空畫布</button>
        </header>

        <main class="flex-grow flex overflow-hidden p-4 gap-4">
            <aside class="w-48 bg-stone-100 p-4 rounded-xl border border-stone-300 flex flex-col gap-4 shadow-inner">
                <h2 class="font-bold text-stone-700 text-sm border-b border-stone-300 pb-2 text-center">素材庫</h2>
                <div class="grid grid-cols-1 gap-2 overflow-y-auto">
                    <button v-for="lib in library" :key="lib.type" 
                            @click="addElement(lib)"
                            class="bg-white p-2 rounded border border-stone-300 hover:border-blue-500 hover:bg-blue-50 transition flex flex-col items-center gap-1 group">
                        <div class="w-16 h-12 flex items-center justify-center overflow-hidden bg-stone-50 rounded">
                            <img :src="lib.img" class="max-w-full max-h-full object-contain group-hover:scale-110 transition">
                        </div>
                        <span class="text-[12px] font-medium">{{ lib.name }}</span>
                    </button>
                </div>
            </aside>

            <div class="flex-grow relative canvas-bg rounded-xl border-2 border-stone-300 overflow-hidden" id="canvas">
                <div v-if="elements.length === 0" class="absolute inset-0 flex items-center justify-center text-stone-300 pointer-events-none">
                    <p class="text-lg italic text-stone-400">請從左側點擊素材開始創作</p>
                </div>
                
                <div v-for="el in elements" 
                     :key="el.id"
                     :id="'el-' + el.id"
                     class="element-item group"
                     :class="{ 'selected-box': selectedId === el.id }"
                     @click.stop="selectedId = el.id"
                     :style="{ width: el.w + 'px', height: el.h + 'px', left: el.x + 'px', top: el.y + 'px', zIndex: el.z }">
                    
                    <img :src="el.img" :alt="el.name" class="pointer-events-none">
                    <div class="resize-handle cursor-nwse-resize"></div>
                </div>
            </div>

            <aside class="w-72 bg-white/90 backdrop-blur-md p-6 rounded-xl shadow-xl border border-stone-200 overflow-y-auto">
                <h2 class="font-bold text-stone-800 mb-6 border-b pb-2 tracking-widest text-center">圖層管理</h2>
                <div class="space-y-3">
                    <div v-for="el in sortedElements" 
                         :key="el.id" 
                         class="p-3 rounded-lg border flex items-center justify-between transition-all"
                         :class="selectedId === el.id ? 'bg-blue-50 border-blue-200' : 'bg-white border-stone-100'">
                        
                        <div class="flex flex-col">
                            <span class="text-[10px] text-stone-400 font-mono italic">#{{ el.id }}</span>
                            <span class="text-sm font-bold text-stone-700">{{ el.name }}</span>
                        </div>
                        
                        <div class="flex items-center gap-1">
                            <button @click.stop="moveLayer(el.id, 1)" class="w-7 h-7 bg-stone-100 rounded flex items-center justify-center hover:bg-stone-200 text-xs">🔼</button>
                            <button @click.stop="moveLayer(el.id, -1)" class="w-7 h-7 bg-stone-100 rounded flex items-center justify-center hover:bg-stone-200 text-xs">🔽</button>
                            <button @click.stop="deleteElement(el.id)" class="w-7 h-7 bg-red-50 text-red-600 rounded flex items-center justify-center hover:bg-red-100 ml-2 text-xs">✕</button>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    selectedId: null,
                    nextId: 1,
                    // 素材庫定義
                    library: [
                        { name: '遠山 1', type: 'mountain', img: 'mountain.png', defaultW: 400, defaultH: 250 },
                        { name: '遠山 2', type: 'mountain2', img: 'mountain2.png', defaultW: 400, defaultH: 250 },
                        { name: '古樹 1', type: 'tree', img: 'tree.png', defaultW: 100, defaultH: 200 },
                        { name: '古樹 2', type: 'tree2', img: 'tree2.png', defaultW: 120, defaultH: 220 },
                        { name: '樓閣', type: 'building', img: 'building1.png', defaultW: 150, defaultH: 150 },
                        { name: '小橋', type: 'bridge', img: 'bridge.png', defaultW: 180, defaultH: 60 },
                        { name: '小船', type: 'boat', img: 'boat.png', defaultW: 100, defaultH: 40 },
                        { name: '景石', type: 'rock', img: 'rock.png', defaultW: 120, defaultH: 80 },
                    ],
                    elements: [] // 初始畫布為空
                }
            },
            computed: { 
                sortedElements() { 
                    return [...this.elements].sort((a, b) => b.z - a.z); 
                } 
            },
            mounted() { this.initInteract(); },
            methods: {
                // 新增物件到畫布
                addElement(lib) {
                    const newEl = {
                        id: this.nextId++,
                        name: lib.name,
                        img: lib.img,
                        x: 50 + (this.elements.length * 20), // 稍微偏移，避免重疊
                        y: 50 + (this.elements.length * 20),
                        w: lib.defaultW,
                        h: lib.defaultH,
                        z: this.elements.length + 1 // 新物件放在最上層
                    };
                    this.elements.push(newEl);
                    this.selectedId = newEl.id;
                },
                // 刪除指定物件
                deleteElement(id) {
                    this.elements = this.elements.filter(el => el.id !== id);
                    if (this.selectedId === id) this.selectedId = null;
                },
                moveLayer(id, delta) {
                    const el = this.elements.find(e => e.id === id);
                    el.z = Math.max(1, el.z + delta);
                },
                initInteract() {
                    interact('.element-item').draggable({
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) {
                                el.x += event.dx;
                                el.y += event.dy;
                            }
                        }}
                    }).resizable({
                        edges: { right: true, bottom: true, bottomRight: true },
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) {
                                el.w = event.rect.width;
                                el.h = event.rect.height;
                                el.x += event.deltaRect.left;
                                el.y += event.deltaRect.top;
                            }
                        }}
                    });
                },
                clearAll() {
                    if (confirm('確定要清空所有畫作內容嗎？')) {
                        this.elements = [];
                        this.selectedId = null;
                        this.nextId = 1;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
