<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿越詩意，建構山水</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #efede5; }
        
        .page-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }

        /* 沉浸式大畫布區域 */
        .canvas-area {
            background-color: #dbd8cb;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .vertical-canvas {
            width: 50vw; /* 佔據網頁寬度的一半 */
            height: 85vh; /* 高度佔據螢幕大部分 */
            background-color: #fcfcf9;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid #c9c4b4;
            overflow: hidden;
        }

        /* 物件樣式：關鍵在於 pointer-events 的運用 */
        .element-item { 
            touch-action: none; 
            position: absolute; 
            cursor: grab;
            pointer-events: auto; /* 預設開啟 */
        }
        
        /* 只有點擊到圖片內容才觸發 */
        .element-item img { 
            width: 100%; 
            height: auto; 
            pointer-events: all; 
        }

        .selected-box {
            outline: 2px dashed #3b82f6;
            outline-offset: 2px;
            z-index: 999 !important; /* 選中時暫時提到最高，方便操作 */
        }

        .floating-controls {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 8px;
            z-index: 1000;
        }
        .selected-box .floating-controls { display: flex; }

        .lib-item {
            cursor: grab;
            transition: all 0.2s;
        }
        .lib-item:active { cursor: grabbing; transform: scale(1.1); }

        /* 底部素材庫 */
        .library-bar {
            background: #2d2a26;
            padding: 1.5rem;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="app" class="page-container" @click="selectedId = null">
        <header class="bg-stone-900 text-stone-100 p-6 flex justify-between items-center z-50 shadow-xl">
            <div class="text-center w-full">
                <h1 class="text-3xl font-bold tracking-[0.5em] text-stone-200">穿越詩意，建構山水</h1>
                <p class="text-xs text-stone-500 mt-2 tracking-widest uppercase">Traditional Landscape Composition System</p>
            </div>
            <button @click="clearAll" class="absolute right-8 text-xs border border-stone-700 px-4 py-2 rounded hover:bg-red-900 transition text-stone-400">清空</button>
        </header>

        <main class="canvas-area">
            <div class="vertical-canvas rounded-sm" id="canvas" @dragover.prevent @drop="handleDrop">
                <div v-if="elements.length === 0" class="absolute inset-0 flex items-center justify-center text-stone-300 pointer-events-none italic">
                    從下方素材庫拖拽景物至此處
                </div>
                
                <div v-for="el in elements" 
                     :key="el.id"
                     :id="'el-' + el.id"
                     class="element-item"
                     :class="{ 'selected-box': selectedId === el.id }"
                     @mousedown.stop="selectedId = el.id"
                     :style="{ width: el.w + 'px', left: el.x + 'px', top: el.y + 'px', zIndex: el.z }">
                    
                    <img :src="el.img" :alt="el.name">
                    
                    <div class="floating-controls bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-2xl border border-blue-200 flex items-center">
                        <button @click.stop="moveLayer(el.id, 1)" class="w-8 h-8 hover:bg-blue-100 rounded-full">🔼</button>
                        <button @click.stop="moveLayer(el.id, -1)" class="w-8 h-8 hover:bg-blue-100 rounded-full">🔽</button>
                        <div class="w-px h-4 bg-stone-300 mx-2"></div>
                        <button @click.stop="deleteElement(el.id)" class="w-8 h-8 text-red-600 hover:bg-red-50 rounded-full">✕</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="library-bar overflow-x-auto">
            <div class="flex flex-row gap-6 justify-center min-w-max px-8">
                <div v-for="lib in library" :key="lib.type" 
                     class="lib-item flex flex-col items-center gap-2 group"
                     draggable="true"
                     @dragstart="handleDragStart(lib)">
                    <div class="w-24 h-20 bg-stone-800/50 rounded-lg flex items-center justify-center p-2 border border-stone-700 group-hover:border-stone-500 transition">
                        <img :src="lib.img" class="max-w-full max-h-full object-contain">
                    </div>
                    <span class="text-[10px] text-stone-400 tracking-tighter">{{ lib.name }}</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    selectedId: null,
                    nextId: 1,
                    draggingLib: null,
                    library: [
                        { name: '遠山壹', type: 'mountain', img: 'mountain.png', defaultW: 350 },
                        { name: '遠山貳', type: 'mountain2', img: 'mountain2.png', defaultW: 350 },
                        { name: '古樹壹', type: 'tree', img: 'tree.png', defaultW: 100 },
                        { name: '古樹貳', type: 'tree2', img: 'tree2.png', defaultW: 120 },
                        { name: '樓閣', type: 'building', img: 'building1.png', defaultW: 150 },
                        { name: '小橋', type: 'bridge', img: 'bridge.png', defaultW: 180 },
                        { name: '小船', type: 'boat', img: 'boat.png', defaultW: 100 },
                        { name: '景石', type: 'rock', img: 'rock.png', defaultW: 100 },
                    ],
                    elements: []
                }
            },
            mounted() { this.initInteract(); },
            methods: {
                handleDragStart(lib) {
                    this.draggingLib = lib;
                },
                handleDrop(e) {
                    const canvas = document.getElementById('canvas').getBoundingClientRect();
                    const x = e.clientX - canvas.left - (this.draggingLib.defaultW / 2);
                    const y = e.clientY - canvas.top - (this.draggingLib.defaultW / 4); // 粗略估計高度

                    const newEl = {
                        id: this.nextId++,
                        name: this.draggingLib.name,
                        img: this.draggingLib.img,
                        x: x,
                        y: y,
                        w: this.draggingLib.defaultW,
                        z: this.elements.length + 1
                    };
                    this.elements.push(newEl);
                    this.selectedId = newEl.id;
                },
                deleteElement(id) {
                    this.elements = this.elements.filter(el => el.id !== id);
                    if (this.selectedId === id) this.selectedId = null;
                },
                moveLayer(id, delta) {
                    const el = this.elements.find(e => e.id === id);
                    if (el) el.z = Math.max(1, el.z + delta);
                },
                initInteract() {
                    interact('.element-item').draggable({
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) { el.x += event.dx; el.y += event.dy; }
                        }}
                    }).resizable({
                        edges: { right: true, bottom: true, bottomRight: true },
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) {
                                el.w = event.rect.width;
                                el.x += event.deltaRect.left;
                                el.y += event.deltaRect.top;
                            }
                        }}
                    });
                },
                clearAll() { if (confirm('重置畫布？')) { this.elements = []; this.nextId = 1; } }
            }
        }).mount('#app');
    </script>
</body>
</html>
