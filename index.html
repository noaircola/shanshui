<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿越詩意，建構山水</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #efede5; overflow: hidden; }
        
        .page-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }

        header { grid-column: span 2; }

        .canvas-area {
            background-color: #dbd8cb;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow: hidden;
        }

        .vertical-canvas {
            width: 50vw; height: 85vh;
            background-color: #fcfcf9;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid #c9c4b4;
        }

        /* 物件樣式：取消藍框 */
        .element-item { 
            touch-action: none; position: absolute; cursor: grab;
        }
        .element-item img { width: 100%; height: auto; }

        /* 側邊縮放拉桿 */
        .resize-slider-container {
            position: absolute;
            right: -30px; top: 0; bottom: 0;
            width: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 1001;
        }
        .is-selected .resize-slider-container { display: flex; }

        .resize-slider {
            appearance: none;
            width: 80px; height: 4px;
            background: #3b82f6;
            transform: rotate(90deg);
            transform-origin: center;
            margin-top: 40px;
            border-radius: 2px;
        }

        /* 浮動按鈕：取消背景，簡約化 */
        .floating-controls {
            position: absolute;
            top: -40px; left: 50%;
            transform: translateX(-50%);
            display: none; gap: 8px;
            z-index: 1001;
        }
        .is-selected .floating-controls { display: flex; }

        /* 右側圖層面板 */
        .layer-panel {
            background: #fdfdfb;
            border-left: 1px solid #d1cfc7;
            padding: 20px;
            overflow-y: auto;
        }

        /* 底部素材庫 */
        footer {
            grid-column: span 2;
            background: #2d2a26;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container" @click="selectedId = null">
        <header class="bg-stone-900 text-stone-100 p-5 shadow-xl">
            <h1 class="text-2xl font-bold tracking-[0.5em] text-center">穿越詩意，建構山水</h1>
        </header>

        <main class="canvas-area">
            <div class="vertical-canvas" id="canvas">
                <div v-for="el in elements" 
                     :key="el.id" :id="'el-' + el.id"
                     class="element-item"
                     :class="{ 'is-selected': selectedId === el.id }"
                     @mousedown.stop="selectedId = el.id"
                     :style="{ width: el.w + 'px', left: el.x + 'px', top: el.y + 'px', zIndex: el.z }">
                    
                    <img :src="el.img" :alt="el.displayName">
                    
                    <div class="resize-slider-container">
                        <input type="range" min="50" max="600" v-model="el.w" class="resize-slider" @mousedown.stop>
                    </div>

                    <div class="floating-controls bg-white/80 backdrop-blur px-2 py-1 rounded-lg shadow-lg border border-stone-200">
                        <button @click.stop="moveLayer(el.id, 1)" class="p-1 hover:bg-stone-200 rounded">🔼</button>
                        <button @click.stop="moveLayer(el.id, -1)" class="p-1 hover:bg-stone-200 rounded">🔽</button>
                        <button @click.stop="deleteElement(el.id)" class="p-1 hover:bg-red-100 text-red-600 rounded">✕</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="layer-panel">
            <h2 class="font-bold text-stone-700 mb-4 border-b pb-2">圖層管理</h2>
            <div class="space-y-2">
                <div v-for="el in sortedElements" :key="el.id" 
                     @click.stop="selectedId = el.id"
                     :class="['p-2 rounded border cursor-pointer transition text-sm flex justify-between items-center', 
                              selectedId === el.id ? 'bg-blue-50 border-blue-400 shadow-sm' : 'bg-white border-stone-200 hover:bg-stone-50']">
                    <span>{{ el.displayName }}</span>
                    <span class="text-[10px] text-stone-400">階層 {{ el.z }}</span>
                </div>
                <div v-if="elements.length === 0" class="text-stone-400 text-xs text-center py-10 italic">尚未新增素材</div>
            </div>
        </aside>

        <footer class="flex gap-4 justify-center">
            <button v-for="lib in library" :key="lib.type" 
                    @click="addElement(lib)"
                    class="bg-stone-800 p-2 rounded border border-stone-600 hover:border-stone-400 transition flex flex-col items-center w-20">
                <img :src="lib.img" class="h-10 object-contain mb-1">
                <span class="text-[9px] text-stone-400">{{ lib.name }}</span>
            </button>
        </footer>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    selectedId: null,
                    nextId: 1,
                    counts: {}, // 用於自動命名計數
                    library: [
                        { name: '山景', type: '山景', img: 'mountain.png', defaultW: 300 },
                        { name: '遠山', type: '遠山', img: 'mountain2.png', defaultW: 300 },
                        { name: '古樹', type: '古樹', img: 'tree.png', defaultW: 100 },
                        { name: '松樹', type: '松樹', img: 'tree2.png', defaultW: 120 },
                        { name: '樓閣', type: '樓閣', img: 'building1.png', defaultW: 150 },
                        { name: '小橋', type: '小橋', img: 'bridge.png', defaultW: 180 },
                        { name: '小船', type: '小船', img: 'boat.png', defaultW: 100 },
                        { name: '石頭', type: '石頭', img: 'rock.png', defaultW: 100 },
                    ],
                    elements: []
                }
            },
            computed: {
                sortedElements() { return [...this.elements].sort((a, b) => b.z - a.z); }
            },
            mounted() { this.initInteract(); },
            methods: {
                addElement(lib) {
                    // 自動命名邏輯
                    const type = lib.type;
                    this.counts[type] = (this.counts[type] || 0) + 1;
                    const displayName = `${type} ${this.counts[type]}`;

                    const newEl = {
                        id: this.nextId++,
                        displayName: displayName,
                        img: lib.img,
                        x: 50, y: 50,
                        w: lib.defaultW,
                        z: this.elements.length + 1
                    };
                    this.elements.push(newEl);
                    this.selectedId = newEl.id;
                },
                deleteElement(id) {
                    this.elements = this.elements.filter(el => el.id !== id);
                    if (this.selectedId === id) this.selectedId = null;
                },
                moveLayer(id, delta) {
                    const el = this.elements.find(e => e.id === id);
                    if (el) el.z = Math.max(1, el.z + delta);
                },
                initInteract() {
                    interact('.element-item').draggable({
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) { el.x += event.dx; el.y += event.dy; }
                        }}
                    });
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
