<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿越詩意，建構山水</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #efede5; overflow: hidden; }
        .page-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }
        header { grid-column: span 2; }
        .canvas-area {
            background-color: #dbd8cb;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow: hidden;
        }
        .vertical-canvas {
            width: 45vw; height: 85vh;
            background-color: #fcfcf9;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid #c9c4b4;
        }
        .element-item { 
            touch-action: none; position: absolute; cursor: grab;
            transition: outline 0.2s;
        }
        .element-item img { width: 100%; height: auto; pointer-events: none; }
        
        /* 選中時只顯示極細的藍色輪廓線 */
        .is-selected { outline: 1px solid rgba(59, 130, 246, 0.5); }

        .floating-controls {
            position: absolute;
            top: -45px; left: 50%;
            transform: translateX(-50%);
            display: none; gap: 6px;
            z-index: 1001;
        }
        .is-selected .floating-controls { display: flex; }

        .layer-panel {
            background: #fdfdfb;
            border-left: 1px solid #d1cfc7;
            padding: 20px;
            overflow-y: auto;
        }

        /* 自定義滑桿樣式 */
        .layer-slider {
            width: 100%; height: 4px;
            background: #e2e2d5;
            border-radius: 2px;
            appearance: none;
            outline: none;
        }
        .layer-slider::-webkit-slider-thumb {
            appearance: none; width: 12px; height: 12px;
            background: #3b82f6; border-radius: 50%; cursor: pointer;
        }

        footer {
            grid-column: span 2;
            background: #2d2a26;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div id="app" class="page-container" @mousedown="selectedId = null">
        <header class="bg-stone-900 text-stone-100 p-5 shadow-xl">
            <h1 class="text-2xl font-bold tracking-[0.5em] text-center">穿越詩意，建構山水</h1>
        </header>

        <main class="canvas-area">
            <div class="vertical-canvas" id="canvas">
                <div v-for="el in elements" 
                     :key="el.id" :id="'el-' + el.id"
                     class="element-item"
                     :class="{ 'is-selected': selectedId === el.id }"
                     @mousedown.stop="selectedId = el.id"
                     :style="{ width: el.w + 'px', left: el.x + 'px', top: el.y + 'px', zIndex: el.z }">
                    
                    <img :src="el.img" :alt="el.displayName">
                    
                    <div class="floating-controls bg-white/90 backdrop-blur px-2 py-1 rounded-full shadow-lg border border-stone-200">
                        <button @click.stop="moveLayer(el.id, 1)" class="w-7 h-7 hover:bg-stone-200 rounded-full text-xs">🔼</button>
                        <button @click.stop="moveLayer(el.id, -1)" class="w-7 h-7 hover:bg-stone-200 rounded-full text-xs">🔽</button>
                        <button @click.stop="deleteElement(el.id)" class="w-7 h-7 text-red-600 hover:bg-red-50 rounded-full text-xs">✕</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="layer-panel" @mousedown.stop>
            <h2 class="font-bold text-stone-700 mb-6 border-b pb-2 tracking-widest text-sm">圖層管理與縮放</h2>
            <div class="space-y-4">
                <div v-for="el in sortedElements" :key="el.id" 
                     @click="selectedId = el.id"
                     :class="['p-4 rounded-xl border transition-all duration-300', 
                              selectedId === el.id ? 'bg-blue-50 border-blue-400 ring-1 ring-blue-100' : 'bg-white border-stone-100 hover:border-stone-200']">
                    
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-bold text-stone-800">{{ el.displayName }}</span>
                        <span class="text-[10px] bg-stone-100 px-2 py-1 rounded text-stone-500 uppercase">Z: {{ el.z }}</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <span class="text-[10px] text-stone-400">大小</span>
                        <input type="range" min="40" max="600" v-model="el.w" class="layer-slider">
                    </div>
                </div>
                <div v-if="elements.length === 0" class="text-stone-400 text-xs text-center py-20 italic">點擊下方素材開始構圖</div>
            </div>
        </aside>

        <footer class="flex gap-4 justify-center overflow-x-auto px-4">
            <button v-for="lib in library" :key="lib.type" 
                    @click="addElement(lib)"
                    class="bg-stone-800 p-2 rounded border border-stone-700 hover:border-blue-500 transition-all flex flex-col items-center w-20 flex-shrink-0 group">
                <div class="h-10 w-16 flex items-center justify-center overflow-hidden mb-1">
                    <img :src="lib.img" class="max-h-full max-w-full object-contain group-hover:scale-110 transition">
                </div>
                <span class="text-[9px] text-stone-500 group-hover:text-blue-300">{{ lib.name }}</span>
            </button>
        </footer>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    selectedId: null,
                    nextId: 1,
                    counts: {},
                    library: [
                        { name: '山景', type: '山景', img: 'mountain.png', defaultW: 300 },
                        { name: '遠山', type: '遠山', img: 'mountain2.png', defaultW: 300 },
                        { name: '古樹', type: '古樹', img: 'tree.png', defaultW: 100 },
                        { name: '松樹', type: '松樹', img: 'tree2.png', defaultW: 120 },
                        { name: '樓閣', type: '樓閣', img: 'building1.png', defaultW: 150 },
                        { name: '小橋', type: '小橋', img: 'bridge.png', defaultW: 180 },
                        { name: '小船', type: '小船', img: 'boat.png', defaultW: 100 },
                        { name: '石頭', type: '石頭', img: 'rock.png', defaultW: 100 },
                    ],
                    elements: []
                }
            },
            computed: {
                sortedElements() { return [...this.elements].sort((a, b) => b.z - a.z); }
            },
            mounted() { this.initInteract(); },
            methods: {
                addElement(lib) {
                    const type = lib.type;
                    this.counts[type] = (this.counts[type] || 0) + 1;
                    const displayName = `${type} ${this.counts[type]}`;

                    const newEl = {
                        id: this.nextId++,
                        displayName: displayName,
                        img: lib.img,
                        x: 50 + (this.elements.length % 5 * 10),
                        y: 80 + (this.elements.length % 5 * 10),
                        w: lib.defaultW,
                        z: this.elements.length + 1
                    };
                    this.elements.push(newEl);
                    this.selectedId = newEl.id;
                },
                deleteElement(id) {
                    this.elements = this.elements.filter(el => el.id !== id);
                    if (this.selectedId === id) this.selectedId = null;
                },
                moveLayer(id, delta) {
                    const el = this.elements.find(e => e.id === id);
                    if (el) el.z = Math.max(1, el.z + delta);
                },
                initInteract() {
                    interact('.element-item').draggable({
                        listeners: { move: (event) => {
                            const id = parseInt(event.target.id.replace('el-', ''));
                            const el = this.elements.find(e => e.id === id);
                            if (el) { el.x += event.dx; el.y += event.dy; }
                        }}
                    });
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
